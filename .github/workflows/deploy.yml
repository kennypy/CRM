name: Deploy

on:
  # Manual-only for now. The staging step below is still a placeholder and the
  # deployment target is the self-hosted LXC (deployed out-of-band), so there's
  # nothing to auto-deploy on every push. Re-add `push: { branches: [main] }`
  # once a real staging target + DATABASE_URL secret are configured.
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options: [staging, production]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false  # Never cancel an in-flight deployment

jobs:
  # ── Build + push Docker images to GHCR ──────────────────────────────────────
  build-images:
    name: Build & push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      sha_tag: ${{ steps.meta.outputs.sha_tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tag
        id: meta
        run: |
          echo "sha_tag=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          # GHCR repository names must be lowercase; ${{ github.repository }} can
          # contain uppercase (e.g. kennypy/CRM), which made every build fail
          # with "repository name must be lowercase". Lowercase it here.
          echo "repo_lc=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build and push — api-gateway
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/api-gateway/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.repo_lc }}/api-gateway:${{ steps.meta.outputs.sha_tag }}
            ghcr.io/${{ steps.meta.outputs.repo_lc }}/api-gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push — auth
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/auth/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.repo_lc }}/auth:${{ steps.meta.outputs.sha_tag }}
            ghcr.io/${{ steps.meta.outputs.repo_lc }}/auth:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push — graph-core
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/graph-core/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.repo_lc }}/graph-core:${{ steps.meta.outputs.sha_tag }}
            ghcr.io/${{ steps.meta.outputs.repo_lc }}/graph-core:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push — outreach
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/outreach/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.repo_lc }}/outreach:${{ steps.meta.outputs.sha_tag }}
            ghcr.io/${{ steps.meta.outputs.repo_lc }}/outreach:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push — ai-engine
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/ai-engine/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.repo_lc }}/ai-engine:${{ steps.meta.outputs.sha_tag }}
            ghcr.io/${{ steps.meta.outputs.repo_lc }}/ai-engine:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push — web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.repo_lc }}/web:${{ steps.meta.outputs.sha_tag }}
            ghcr.io/${{ steps.meta.outputs.repo_lc }}/web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}

  # ── Run DB migrations ────────────────────────────────────────────────────────
  migrate:
    name: Run DB migrations
    runs-on: ubuntu-latest
    needs: build-images
    environment: ${{ github.event.inputs.environment || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --workspace=services/graph-core

      - name: Run migrations
        run: npm run db:migrate --workspace=services/graph-core
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  # ── Deploy to staging (placeholder — fill in for your infra) ─────────────────
  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: [build-images, migrate]
    environment: staging
    if: github.event.inputs.environment != 'production'
    steps:
      - name: Deploy
        run: |
          echo "Deploy image tag ${{ needs.build-images.outputs.sha_tag }} to staging"
          # TODO: replace with kubectl set image / Railway deploy / etc.
