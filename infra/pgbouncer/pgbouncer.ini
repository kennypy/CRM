[databases]
; Route all nexcrm connections through the pool.
; In production, replace "postgres" with your managed DB host.
nexcrm = host=${POSTGRES_HOST:-postgres} port=5432 dbname=nexcrm

[pgbouncer]
listen_addr        = 0.0.0.0
listen_port        = 5433
auth_type          = md5
auth_file          = /etc/pgbouncer/userlist.txt

; Transaction mode is ideal for microservices — each query gets a connection
; from the pool and returns it immediately. Session mode is needed for
; SET LOCAL / advisory locks / prepared statements.
pool_mode          = transaction

; Maximum total connections to the upstream PostgreSQL server.
; Tune based on PostgreSQL's max_connections (default 100).
max_client_conn    = 200
default_pool_size  = 20
min_pool_size      = 2
reserve_pool_size  = 5
reserve_pool_timeout = 3

; Idle connections are recycled after 10 minutes
server_idle_timeout = 600
; Client connections waiting > 10s get an error (not a silent hang)
query_wait_timeout  = 10

log_connections = 0
log_disconnections = 0
log_pooler_errors = 1

; Enable stats endpoint (requires valid credentials)
stats_users = nexcrm
