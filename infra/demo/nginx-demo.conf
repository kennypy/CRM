# NexCRM Demo — nginx reverse proxy
#
# Assumes:
#   - Cloudflare handles SSL termination (orange-cloud enabled)
#   - Docker containers expose web on :3000, api-gateway on :4000
#   - This config goes in /etc/nginx/sites-available/nexcrm-demo
#
# If using Cloudflare Full (Strict) SSL mode, add your origin certificate:
#   ssl_certificate     /etc/ssl/nexcrm/cert.pem;
#   ssl_certificate_key /etc/ssl/nexcrm/key.pem;

# Rate limiting — must be in http context.
# If you get an error, move this line to /etc/nginx/nginx.conf inside the http {} block.
limit_req_zone $binary_remote_addr zone=demo:10m rate=30r/s;

server {
    listen 80;
    server_name demo.nexcrm.io;

    # Redirect landing page root to /landing
    location = / {
        return 302 /landing;
    }

    # Also add the landing page and demo links to the main nexcrm.io site
    # (configure separately in your existing nexcrm.io nginx config)

    # Next.js web app
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }

    # API proxy (Next.js Route Handlers handle this, but just in case)
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120;
    }

    # Health check
    location /health {
        proxy_pass http://127.0.0.1:4000/health;
        access_log off;
    }

    # Security headers (supplementing Cloudflare)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Rate limiting for demo (prevent abuse)
    limit_req zone=demo burst=50 nodelay;
}
