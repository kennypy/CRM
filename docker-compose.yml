version: "3.9"

# NexCRM — Local development infrastructure stack
# Starts all dependencies; services run via `npm run dev`
#
# Usage:
#   npm run docker:up       — start all infra
#   npm run docker:down     — stop all infra
#   docker compose logs -f  — tail logs

services:
  # ── PostgreSQL 16 with Apache AGE (graph) + pgvector ──────────────────────
  postgres:
    image: apache/age:release_PG16_1.6.0
    container_name: nexcrm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nexcrm
      POSTGRES_PASSWORD: nexcrm_dev
      POSTGRES_DB: nexcrm
    ports:
      # Bind to loopback only — Postgres must NOT be reachable from the network.
      # Services connect via the internal Docker network (host: postgres).
      - "127.0.0.1:5432:5432"
    volumes:
      - .docker-data/postgres:/var/lib/postgresql/data
      - ./infra/db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexcrm -d nexcrm"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis 7 (cache + streams) ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nexcrm-redis
    restart: unless-stopped
    # requirepass enforces authentication — all service REDIS_URLs must include the password.
    # --protected-mode yes (default) also rejects connections from non-loopback without auth.
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy noeviction
      --requirepass ${REDIS_PASSWORD:-nexcrm_redis_dev_password}
    ports:
      # Bind to loopback only — Redis must NOT be reachable from the network.
      - "127.0.0.1:6379:6379"
    volumes:
      - .docker-data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-nexcrm_redis_dev_password}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── PgBouncer (PostgreSQL connection pooler) ──────────────────────────────
  # Routes all service DB connections through a shared pool, preventing
  # connection exhaustion when multiple service instances run simultaneously.
  # Services should connect to pgbouncer:5433 rather than postgres:5432.
  # DATABASE_URL uses postgres:5432 directly only for migrations (session mode needed).
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: nexcrm-pgbouncer
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: nexcrm
      DB_USER: nexcrm
      DB_PASSWORD: ${POSTGRES_PASSWORD:-nexcrm_dev}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "200"
      DEFAULT_POOL_SIZE: "20"
    ports:
      - "127.0.0.1:5433:5432"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432 -U nexcrm"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO (S3-compatible file storage) ────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: nexcrm-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      # Bind S3 API and console to loopback — internal services use Docker network name.
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - .docker-data/minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Typesense (full-text + semantic search) ───────────────────────────────
  typesense:
    image: typesense/typesense:27.0
    container_name: nexcrm-typesense
    restart: unless-stopped
    environment:
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY:-nexcrm-typesense-dev-key}
      TYPESENSE_DATA_DIR: /data
    ports:
      # Loopback only — Typesense API key provides auth but the port should
      # still not be accessible outside the host.
      - "127.0.0.1:8108:8108"
    volumes:
      - .docker-data/typesense:/data

  # ── OpenTelemetry Collector ───────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: nexcrm-otel
    restart: unless-stopped
    volumes:
      - ./infra/otel/config.yml:/etc/otelcol-contrib/config.yaml
    ports:
      - "127.0.0.1:4317:4317"   # gRPC
      - "127.0.0.1:4318:4318"   # HTTP
      - "127.0.0.1:8888:8888"   # metrics
    depends_on: [tempo, prometheus, loki]

  # ── Grafana (dashboards + visualization) ─────────────────────────────────
  grafana:
    image: grafana/grafana:11.0.0
    container_name: nexcrm-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      # Admin password sourced from env. The :- fallback keeps local dev working,
      # but GRAFANA_ADMIN_PASSWORD MUST be overridden in .env for any shared/staging/
      # production deployment — never ship Grafana with the default "admin" password.
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      # Anonymous access disabled — Grafana previously granted anonymous Admin.
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    ports:
      - "127.0.0.1:3001:3000"
    volumes:
      - .docker-data/grafana:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on: [tempo, prometheus, loki]

  # ── Tempo (distributed tracing backend) ──────────────────────────────────
  tempo:
    image: grafana/tempo:2.4.1
    container_name: nexcrm-tempo
    restart: unless-stopped
    command: ["-config.file=/etc/tempo.yml"]
    volumes:
      - ./infra/tempo/config.yml:/etc/tempo.yml
      - .docker-data/tempo:/tmp/tempo
    ports:
      - "127.0.0.1:3200:3200"   # Tempo query API

  # ── Prometheus (metrics) ─────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: nexcrm-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-remote-write-receiver"
      - "--storage.tsdb.path=/prometheus"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - .docker-data/prometheus:/prometheus
    ports:
      - "127.0.0.1:9090:9090"

  # ── Loki (log aggregation) ──────────────────────────────────────────────
  loki:
    image: grafana/loki:2.9.7
    container_name: nexcrm-loki
    restart: unless-stopped
    command: ["-config.file=/etc/loki/loki.yml"]
    volumes:
      - ./infra/loki/loki.yml:/etc/loki/loki.yml
      - .docker-data/loki:/loki
    ports:
      - "127.0.0.1:3100:3100"

  # ── Mailhog (local email capture for dev) ─────────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: nexcrm-mailhog
    restart: unless-stopped
    ports:
      # Loopback only — the MailHog web UI must not be reachable on the network.
      - "127.0.0.1:1025:1025"   # SMTP
      - "127.0.0.1:8025:8025"   # Web UI

  # ── Application services (built images for full-stack testing) ─────────────
  # For day-to-day dev, run services directly with `npm run dev` instead.
  # Use these targets for integration testing or staging validation.

  api-gateway:
    build: { context: ., dockerfile: services/api-gateway/Dockerfile }
    container_name: nexcrm-api-gateway
    restart: unless-stopped
    env_file: .env
    environment:
      AUTH_SERVICE_URL: http://auth:4001
      GRAPH_CORE_URL: http://graph-core:4002
      OUTREACH_URL: http://outreach:4003
      AI_ENGINE_URL: http://ai-engine:5001
    ports:
      - "4000:4000"
    depends_on: [postgres, redis]
    profiles: [full-stack]

  auth:
    build: { context: ., dockerfile: services/auth/Dockerfile }
    container_name: nexcrm-auth
    restart: unless-stopped
    env_file: .env
    environment:
      AUTH_PORT: "4001"
    ports:
      - "127.0.0.1:4001:4001"
    depends_on: [postgres, redis]
    profiles: [full-stack]

  graph-core:
    build: { context: ., dockerfile: services/graph-core/Dockerfile }
    container_name: nexcrm-graph-core
    restart: unless-stopped
    env_file: .env
    environment:
      GRAPH_CORE_PORT: "4002"
    ports:
      - "127.0.0.1:4002:4002"
    depends_on: [postgres, redis]
    profiles: [full-stack]

  outreach:
    build: { context: ., dockerfile: services/outreach/Dockerfile }
    container_name: nexcrm-outreach
    restart: unless-stopped
    env_file: .env
    environment:
      OUTREACH_PORT: "4003"
      # Internal: only API gateway should reach this service
      API_GATEWAY_URL: http://api-gateway:4000
    ports:
      - "127.0.0.1:4003:4003"
    depends_on: [postgres, redis]
    profiles: [full-stack]

  ai-engine:
    build: { context: ., dockerfile: services/ai-engine/Dockerfile }
    container_name: nexcrm-ai-engine
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:5001:5001"
    depends_on: [postgres, redis]
    profiles: [full-stack]

  web:
    build: { context: ., dockerfile: apps/web/Dockerfile }
    container_name: nexcrm-web
    restart: unless-stopped
    env_file: .env
    ports:
      - "3000:3000"
    depends_on: [api-gateway]
    profiles: [full-stack]

networks:
  default:
    name: nexcrm-network
